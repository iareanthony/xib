# Connect the existing XIB Grafana to the separately managed Docker SIB stack.
services:
  grafana:
    environment:
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    volumes:
      - ${SIB_DIR:-./.xib-components/sib}/grafana/provisioning/dashboards/victorialogs:/etc/grafana/sib-dashboards:ro
    networks:
      - xib
      - sib-network

networks:
  sib-network:
    external: true
