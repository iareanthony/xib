{{- if or .Values.aib.enabled .Values.vib.enabled .Values.cib.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: {name: {{ include "xib.fullname" . }}-reader}
rules:
  - apiGroups: ["", apps, batch, networking.k8s.io, rbac.authorization.k8s.io]
    resources: [pods, services, namespaces, nodes, configmaps, deployments, daemonsets, statefulsets, replicasets, jobs, cronjobs, ingresses, roles, rolebindings, clusterroles, clusterrolebindings]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: {name: {{ include "xib.fullname" . }}-reader}
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: {{ include "xib.fullname" . }}-reader}
subjects:
  - {kind: ServiceAccount, name: {{ include "xib.fullname" . }}, namespace: {{ .Release.Namespace }} }
{{- end }}
