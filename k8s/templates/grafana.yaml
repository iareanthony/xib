{{- if .Values.platform.grafana.deploy }}
{{- if not .Values.platform.grafana.admin.existingSecret }}
{{- $adminSecretName := printf "%s-grafana-admin" (include "xib.fullname" .) }}
{{- $existingAdminSecret := lookup "v1" "Secret" .Release.Namespace $adminSecretName }}
apiVersion: v1
kind: Secret
metadata: {name: {{ $adminSecretName }}}
type: Opaque
stringData:
  admin-user: admin
  {{- if and $existingAdminSecret (index $existingAdminSecret.data "admin-password") }}
  admin-password: {{ index $existingAdminSecret.data "admin-password" | b64dec | quote }}
  {{- else }}
  admin-password: {{ randAlphaNum 24 | quote }}
  {{- end }}
---
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata: {name: {{ include "xib.fullname" . }}-grafana-datasources}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: XIB Metrics
        uid: xib-metrics
        type: prometheus
        access: proxy
        url: {{ include "xib.vmUrl" . }}
        isDefault: true
      - {name: VIB Metrics, uid: vib-vm, type: prometheus, access: proxy, url: {{ include "xib.vmUrl" . }}}
      - {name: TIB Metrics, uid: tib-vm, type: prometheus, access: proxy, url: {{ include "xib.vmUrl" . }}}
      - {name: CIB Metrics, uid: cib-vm, type: prometheus, access: proxy, url: {{ include "xib.vmUrl" . }}}
      - {name: IIB Metrics, uid: iib-vm, type: prometheus, access: proxy, url: {{ include "xib.vmUrl" . }}}
      - {name: PIB Metrics, uid: pib-vm, type: prometheus, access: proxy, url: {{ include "xib.vmUrl" . }}}
---
apiVersion: v1
kind: ConfigMap
metadata: {name: {{ include "xib.fullname" . }}-grafana-dashboards}
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: XIB Dashboards
        orgId: 1
        folder: XIB
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards
          foldersFromFilesStructure: false
  {{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: {{ include "xib.fullname" . }}-grafana}
spec:
  accessModes: [ReadWriteOnce]
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass | quote }}
  {{- end }}
  resources: {requests: {storage: {{ .Values.platform.grafana.storage }}}}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: {{ include "xib.fullname" . }}-grafana}
spec:
  replicas: 1
  selector: {matchLabels: {app.kubernetes.io/name: xib-grafana}}
  template:
    metadata: {labels: {app.kubernetes.io/name: xib-grafana, app.kubernetes.io/part-of: xib}}
    spec:
      serviceAccountName: {{ include "xib.fullname" . }}
      securityContext: {runAsNonRoot: true, runAsUser: 472, runAsGroup: 472, fsGroup: 472, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: grafana
          image: {{ .Values.platform.grafana.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports: [{name: http, containerPort: 3000}]
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-grafana-admin" (include "xib.fullname" .)) .Values.platform.grafana.admin.existingSecret }}
                  key: {{ .Values.platform.grafana.admin.userKey }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-grafana-admin" (include "xib.fullname" .)) .Values.platform.grafana.admin.existingSecret }}
                  key: {{ .Values.platform.grafana.admin.passwordKey }}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}}
          resources: {requests: {cpu: 100m, memory: 128Mi}, limits: {cpu: "1", memory: 512Mi}}
          volumeMounts:
            - {name: data, mountPath: /var/lib/grafana}
            - {name: datasources, mountPath: /etc/grafana/provisioning/datasources, readOnly: true}
            - {name: dashboards, mountPath: /etc/grafana/dashboards, readOnly: true}
            - {name: dashboards, mountPath: /etc/grafana/provisioning/dashboards/xib.yaml, subPath: provider.yaml, readOnly: true}
      volumes:
        - {name: data, persistentVolumeClaim: {claimName: {{ include "xib.fullname" . }}-grafana}}
        - {name: datasources, configMap: {name: {{ include "xib.fullname" . }}-grafana-datasources}}
        - {name: dashboards, configMap: {name: {{ include "xib.fullname" . }}-grafana-dashboards}}
---
apiVersion: v1
kind: Service
metadata: {name: {{ include "xib.fullname" . }}-grafana}
spec:
  selector: {app.kubernetes.io/name: xib-grafana}
  ports: [{name: http, port: 3000, targetPort: http}]
{{- end }}
