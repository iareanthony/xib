{{- if .Values.sib.enabled }}
apiVersion: v1
kind: ConfigMap
metadata: {name: {{ include "xib.fullname" . }}-sib-integration}
data:
  releaseName: {{ .Values.sib.releaseName | quote }}
  namespace: {{ .Values.sib.namespace | quote }}
  install: "Install the vendored sib-k8s chart as a second release from the offline bundle."
{{- end }}

