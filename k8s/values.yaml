global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  storageClass: ""
  trustedCa:
    # Automatically use custom-ca/ca.crt when it exists in the chart directory.
    autoDiscover: true
    # ConfigMap containing one or more PEM root CAs. XIB appends these to the
    # public CA bundle. This takes precedence over auto-discovery.
    existingConfigMap: ""
    key: ca.crt
    bundleImage: alpine:3.22.1

xib:
  # Kept outside Helm's reserved global scope so this prefix is not inherited
  # by the vendored SIB dependency charts.
  imageRegistry: ghcr.io/iareanthony

platform:
  metrics:
    deploy: true
    image: victoriametrics/victoria-metrics:v1.121.0
    retention: 90d
    storage: 20Gi
  grafana:
    deploy: true
    image: grafana/grafana:12.1.0
    storage: 2Gi
    admin:
      existingSecret: ""
      userKey: admin-user
      passwordKey: admin-password
  prometheusOperator:
    enabled: false

aib:
  enabled: true
  image: aib:sha-94da209
  storage: 5Gi
  servicePort: 8080
  config: |
    storage:
      path: /data/aib.db
    server:
      listen: 0.0.0.0:8080
      read_only: true
    sources:
      kubernetes:
        - live: true
    scan:
      on_startup: true

vib:
  enabled: true
  image: xib-vib-scanner@sha256:f17e85c9ccc00194c959522fc75eaab0a5e8ab709065bdec76837199e01af2cd
  scanIntervalHours: "6"
  severityFilter: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
  additionalImages: ""
  dockerHosts: ""
  storage: 10Gi

cib:
  enabled: true
  image: xib-cib-checker@sha256:fb815194eabb0a2048871ad174ee479050b65e6b817c111527ed4fabb58e85f3
  scanIntervalHours: "6"
  additionalImages: ""
  dockerHosts: ""
  storage: 10Gi

tib:
  enabled: true
  image: xib-tib-collector@sha256:0b9fe36da1e6ad2bf8760103e3543fc4d366a38671f1b07a63c4c2da412a7902
  syncIntervalHours: "6"
  storage: 5Gi
  feeds:
    # For an air-gapped cluster, serve mirrored files from an internal HTTP service.
    cisaKevUrl: https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json
    epssApiUrl: https://api.first.org/data/v1/epss

iib:
  enabled: false
  image: xib-iib-monitor@sha256:64e93f7c69546056b3a6edca2f0a1a3c1639545a6a95c831dffb13908613a3e8
  authentikUrl: http://authentik-server.authentication.svc:80
  existingSecret: authentik-iib-monitor
  tokenKey: token
  intervalSeconds: "300"

pib:
  enabled: false
  image: xib-pib-monitor@sha256:8171cbd2629e79d97ed0eaedfd4d18d24cc1875bce8cb154ab2c0f9eeddf3f1b
  endpoints: ""
  intervalHours: "6"

sib:
  # SIB-K8s is vendored into this chart and installed as part of the XIB release.
  enabled: true
  global:
    namespace: xib-system
  auditPlugin:
    type: k8saudit
    k8saudit:
      enabled: true
      serviceType: ClusterIP
  syscallMonitoring:
    enabled: true
    driverKind: modern_ebpf
  analysis:
    # Requires a separately configured LLM endpoint and is not part of the
    # default test-cluster footprint.
    enabled: false
  falco:
    falco:
      http_output:
        url: "http://xib-falcosidekick:2801"
  falcosidekick:
    fullnameOverride: xib-falcosidekick
    config:
      loki:
        hostport: "http://xib-loki:3100"
  loki:
    enabled: true
    fullnameOverride: xib-loki
  grafana:
    # XIB's Grafana loads the SIB dashboards and Loki datasource.
    enabled: false
