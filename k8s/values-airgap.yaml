global:
  # Change to the registry reachable by every node in the offline cluster.
  imageRegistry: registry.local/xib
  imagePullPolicy: IfNotPresent

tib:
  feeds:
    cisaKevUrl: http://xib-offline-data/xib-data/known_exploited_vulnerabilities.json
    # Mirror the FIRST API response shape, including a top-level "data" array.
    epssApiUrl: http://xib-offline-data/xib-data/epss-api.json
