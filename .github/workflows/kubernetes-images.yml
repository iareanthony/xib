name: Kubernetes adapter images

on:
  push:
    branches: [master]
    paths:
      - images/**
      - vib/**
      - .github/workflows/kubernetes-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  cib-k8s:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/cib-k8s/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/xib-cib-checker:0.1.0
            ghcr.io/${{ github.repository_owner }}/xib-cib-checker:sha-${{ github.sha }}

  vib-k8s:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/vib-k8s/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/xib-vib-scanner:0.1.0
            ghcr.io/${{ github.repository_owner }}/xib-vib-scanner:sha-${{ github.sha }}
