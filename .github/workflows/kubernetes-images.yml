name: Kubernetes adapter images

on:
  push:
    branches: [master]
    paths:
      - images/**
      - vib/**
      - .github/workflows/kubernetes-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {name: vib, image: xib-vib-scanner, file: images/vib-k8s/Dockerfile}
          - {name: cib, image: xib-cib-checker, file: images/cib-k8s/Dockerfile}
          - {name: tib, image: xib-tib-collector, file: images/tib-k8s/Dockerfile}
          - {name: pib, image: xib-pib-monitor, file: images/pib-k8s/Dockerfile}
          - {name: iib, image: xib-iib-monitor, file: images/iib-k8s/Dockerfile}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out live application source
        if: matrix.name == 'vib' || matrix.name == 'cib' || matrix.name == 'tib'
        run: git submodule update --init --depth 1 ${{ matrix.name }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:0.2.0
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:sha-${{ github.sha }}
          labels: org.opencontainers.image.revision=${{ github.sha }}
