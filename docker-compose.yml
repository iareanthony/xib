x-collector: &collector
  restart: unless-stopped
  depends_on:
    victoriametrics:
      condition: service_healthy
    initialize-volumes:
      condition: service_completed_successfully
  networks: [xib]

x-docker-collector: &docker-collector
  <<: *collector
  depends_on:
    docker-socket-proxy:
      condition: service_healthy
    victoriametrics:
      condition: service_healthy
    initialize-volumes:
      condition: service_completed_successfully

services:
  docker-socket-proxy:
    container_name: ${XIB_CONTAINER_PREFIX:-xib}-docker-socket-proxy
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    restart: unless-stopped
    environment:
      CONTAINERS: "1"
      IMAGES: "1"
      INFO: "1"
      VERSION: "1"
      PING: "1"
      POST: "0"
      DELETE: "0"
      EXEC: "0"
      AUTH: "0"
      BUILD: "0"
      COMMIT: "0"
      CONFIGS: "0"
      DISTRIBUTION: "0"
      EVENTS: "0"
      GRPC: "0"
      NETWORKS: "0"
      NODES: "0"
      PLUGINS: "0"
      SECRETS: "0"
      SERVICES: "0"
      SESSION: "0"
      SWARM: "0"
      SYSTEM: "0"
      TASKS: "0"
      VOLUMES: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [xib]
    healthcheck:
      test: [CMD, wget, -q, --spider, http://127.0.0.1:2375/_ping]
      interval: 10s
      timeout: 3s
      retries: 12

  initialize-volumes:
    container_name: ${XIB_CONTAINER_PREFIX:-xib}-initialize-volumes
    image: grafana/grafana:12.1.0
    user: "0:0"
    entrypoint: [sh, -c]
    command: ["chown -R 10001:10001 /volumes/vib /volumes/cib /volumes/tib"]
    volumes:
      - vib-trivy-cache:/volumes/vib
      - cib-data:/volumes/cib
      - tib-data:/volumes/tib
    networks: [xib]
    restart: "no"

  victoriametrics:
    container_name: ${XIB_CONTAINER_PREFIX:-xib}-victoriametrics
    image: victoriametrics/victoria-metrics:v1.121.0
    restart: unless-stopped
    command: ["-storageDataPath=/data", "-retentionPeriod=${XIB_RETENTION:-90d}"]
    volumes: ["metrics-data:/data"]
    networks:
      xib:
        aliases: [vib-victoriametrics, tib-victoriametrics, cib-victoriametrics, iib-victoriametrics, pib-victoriametrics]
    healthcheck:
      test: [CMD, /victoria-metrics-prod, -version]
      interval: 10s
      timeout: 3s
      retries: 12

  vib:
    container_name: ${XIB_CONTAINER_PREFIX:-xib}-vib
    <<: *docker-collector
    image: ghcr.io/iareanthony/xib-vib-scanner@sha256:f17e85c9ccc00194c959522fc75eaab0a5e8ab709065bdec76837199e01af2cd
    volumes: ["vib-trivy-cache:/data/trivy-cache"]
    environment:
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      VICTORIAMETRICS_URL: http://victoriametrics:8428
      TRIVY_CACHE_DIR: /data/trivy-cache
      SCAN_INTERVAL_HOURS: "${VIB_SCAN_INTERVAL_HOURS:-6}"
      SEVERITY_FILTER: "${VIB_SEVERITY_FILTER:-UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL}"
      ADDITIONAL_IMAGES: "${XIB_SCAN_IMAGES:-ghcr.io/iareanthony/xib-vib-scanner:0.2.0,ghcr.io/iareanthony/xib-cib-checker:0.2.0,ghcr.io/iareanthony/xib-tib-collector:0.2.0,ghcr.io/iareanthony/xib-pib-monitor:0.2.0,ghcr.io/iareanthony/xib-iib-monitor:0.2.0}"

  cib:
    container_name: ${XIB_CONTAINER_PREFIX:-xib}-cib
    <<: *docker-collector
    image: ghcr.io/iareanthony/xib-cib-checker@sha256:fb815194eabb0a2048871ad174ee479050b65e6b817c111527ed4fabb58e85f3
    volumes: ["cib-data:/data"]
    environment:
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      VICTORIAMETRICS_URL: http://victoriametrics:8428
      TRIVY_CACHE_DIR: /data/trivy-cache
      SCAN_INTERVAL_HOURS: "${CIB_SCAN_INTERVAL_HOURS:-6}"
      ADDITIONAL_IMAGES: "${XIB_SCAN_IMAGES:-ghcr.io/iareanthony/xib-vib-scanner:0.2.0,ghcr.io/iareanthony/xib-cib-checker:0.2.0,ghcr.io/iareanthony/xib-tib-collector:0.2.0,ghcr.io/iareanthony/xib-pib-monitor:0.2.0,ghcr.io/iareanthony/xib-iib-monitor:0.2.0}"

  tib:
    container_name: ${XIB_CONTAINER_PREFIX:-xib}-tib
    <<: *collector
    image: ghcr.io/iareanthony/xib-tib-collector@sha256:0b9fe36da1e6ad2bf8760103e3543fc4d366a38671f1b07a63c4c2da412a7902
    volumes: ["tib-data:/data"]
    environment:
      VICTORIAMETRICS_URL: http://victoriametrics:8428
      VIB_VICTORIAMETRICS_URL: http://victoriametrics:8428
      SYNC_INTERVAL_HOURS: "${TIB_SYNC_INTERVAL_HOURS:-6}"
      CISA_KEV_URL: "${CISA_KEV_URL:-https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json}"
      EPSS_API_URL: "${EPSS_API_URL:-https://api.first.org/data/v1/epss}"

  pib:
    container_name: ${XIB_CONTAINER_PREFIX:-xib}-pib
    profiles: [pki]
    <<: *collector
    image: ghcr.io/iareanthony/xib-pib-monitor@sha256:8171cbd2629e79d97ed0eaedfd4d18d24cc1875bce8cb154ab2c0f9eeddf3f1b
    environment:
      VICTORIAMETRICS_URL: http://victoriametrics:8428
      ENDPOINTS: "${PIB_ENDPOINTS:-}"
      CHECK_INTERVAL_HOURS: "${PIB_CHECK_INTERVAL_HOURS:-6}"

  iib:
    container_name: ${XIB_CONTAINER_PREFIX:-xib}-iib
    profiles: [identity]
    restart: unless-stopped
    image: ghcr.io/iareanthony/xib-iib-monitor@sha256:64e93f7c69546056b3a6edca2f0a1a3c1639545a6a95c831dffb13908613a3e8
    environment:
      AUTHENTIK_URL: "${AUTHENTIK_URL:-http://host.docker.internal:9000}"
      AUTHENTIK_TOKEN: "${AUTHENTIK_TOKEN:-}"
      INTERVAL_SECONDS: "${IIB_INTERVAL_SECONDS:-300}"
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [xib]

  grafana:
    container_name: ${XIB_CONTAINER_PREFIX:-xib}-grafana
    image: grafana/grafana:12.1.0
    restart: unless-stopped
    ports: ["${BIND_ADDR:-127.0.0.1}:${XIB_GRAFANA_PORT:-3000}:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: "${XIB_GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${XIB_GRAFANA_PASSWORD:-changeme}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/xib-overview.json
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./k8s/dashboards:/etc/grafana/dashboards:ro
      - ./sib/grafana/provisioning/dashboards/victorialogs:/etc/grafana/sib-dashboards:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
    networks:
      xib: {}
      sib:
        aliases: [sib-grafana]

  sib-victorialogs:
    profiles: [sib]
    container_name: ${SIB_CONTAINER_PREFIX:-sib}-victorialogs
    image: victoriametrics/victoria-logs:v1.50.0
    restart: unless-stopped
    ports: ["${SIB_STORAGE_BIND:-127.0.0.1}:${SIB_VICTORIALOGS_PORT:-9428}:9428"]
    command: ["-storageDataPath=/vlogs", "-retentionPeriod=${SIB_LOG_RETENTION:-168h}"]
    volumes: [sib-victorialogs-data:/vlogs]
    networks: [sib]
    healthcheck:
      test: [CMD, wget, -q, --spider, http://127.0.0.1:9428/health]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sib-victoriametrics:
    profiles: [sib]
    container_name: ${SIB_CONTAINER_PREFIX:-sib}-victoriametrics
    image: victoriametrics/victoria-metrics:v1.144.0
    restart: unless-stopped
    ports: ["${SIB_STORAGE_BIND:-127.0.0.1}:${SIB_VICTORIAMETRICS_PORT:-8429}:8428"]
    command:
      - -storageDataPath=/vmstorage
      - -retentionPeriod=${SIB_METRICS_RETENTION:-15d}
      - -httpListenAddr=:8428
      - -promscrape.config=/etc/prometheus/prometheus.yml
    volumes:
      - sib-victoriametrics-data:/vmstorage
      - ./sib/storage/config/prometheus-vm.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      sib:
        aliases: [sib-victoriametrics]
    healthcheck:
      test: [CMD, wget, -q, --spider, http://127.0.0.1:8428/health]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sib-node-exporter:
    profiles: [sib]
    container_name: ${SIB_CONTAINER_PREFIX:-sib}-node-exporter
    image: prom/node-exporter:v1.11.1
    restart: unless-stopped
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    networks: [sib]

  sib-sidekick:
    profiles: [sib]
    container_name: ${SIB_CONTAINER_PREFIX:-sib}-sidekick
    image: falcosecurity/falcosidekick:2.29.0
    restart: unless-stopped
    ports: ["${SIB_SIDEKICK_BIND:-127.0.0.1}:${SIB_SIDEKICK_PORT:-2801}:2801"]
    command: [-c, /etc/falcosidekick/config.yaml]
    volumes:
      - ./config/sib/falcosidekick.yaml:/etc/falcosidekick/config.yaml:ro
    networks: [sib]
    depends_on:
      sib-victorialogs:
        condition: service_healthy
    healthcheck:
      test: [CMD-SHELL, nc -z 127.0.0.1 2801]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sib-falco:
    profiles: [sib]
    container_name: ${SIB_CONTAINER_PREFIX:-sib}-falco
    hostname: sib-host
    image: falcosecurity/falco:0.44.0
    privileged: true
    restart: unless-stopped
    environment:
      HOST_ROOT: /host
      FALCOCTL_DRIVER_TYPE: modern_ebpf
    volumes:
      - ./config/sib/falco.yaml:/etc/falco/falco.yaml:ro
      - ./sib/detection/config/rules:/etc/falco/rules:ro
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /dev:/host/dev:ro
      - /proc:/host/proc:ro
      - /etc:/host/etc:ro
    networks: [sib]
    depends_on:
      sib-sidekick:
        condition: service_healthy
    healthcheck:
      test: [CMD, curl, -f, http://127.0.0.1:8765/healthz]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  xib: {}
  sib: {}
volumes:
  metrics-data: {}
  grafana-data: {}
  vib-trivy-cache: {}
  cib-data: {}
  tib-data: {}
  sib-victorialogs-data: {}
  sib-victoriametrics-data: {}
